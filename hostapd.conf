# General settings of hostapd
# ===========================

# Control interface settings
ctrl_interface=/var/run/hostapd
ctrl_interface_group=root

# Enable logging for all modules
logger_syslog=-1
logger_stdout=-1

# Log level
logger_syslog_level=0
logger_stdout_level=2


# Wired 802.1X authentication
# ===========================

# Driver interface type
driver=wired

# Enable IEEE 802.1X authorization
ieee8021x=1

# Use port access entry (PAE) group address
# (01:80:c2:00:00:03) when sending EAPOL frames
use_pae_group_addr=1

# Network interface for authentication requests
interface=eth0

# Certificate based authentication
# ================================
# 802.1X/WPA Enterprise settings
wpa=2
wpa_key_mgmt=WPA-EAP
# Use hostapd's internal EAP server
eap_server=1 
# eapol_version=1 # Use EAPOL version 1 (default)

# Paths to your certificates
# Path to the Root CA certificate
ca_cert=/etc/hostapd.ca.pem
# Path to the server certificate
server_cert=/etc/hostapd.server.pem
# Path to the server private key
private_key=/etc/hostapd.server.prv
# private_key_passwd=### # Uncomment and set password if your key is encrypted

# EAP user file (for username/password in PEAP/TTLS, EAP-TLS just needs client cert)
eap_user_file=/etc/hostapd.eap_user

